name: "Terraform OCI Apply"

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "oci/**"

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: terraform-apply-${{ github.repository }}-oci
      cancel-in-progress: false
    defaults:
      run:
        working-directory: oci

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # ratchet:hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.5"

      - name: OCI private key
        run: |
          printf '%s' "$OCI_PRIVATE_KEY" > /tmp/oci-api-key.pem
          chmod 600 /tmp/oci-api-key.pem
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Terraform init
        run: terraform init
        env:
          PG_CONN_STR: ${{ secrets.PG_CONN_STR }}

      - name: Terraform plan/apply
        run: |
          set -euo pipefail
          plan_file="$(mktemp "${TMPDIR:-/tmp}/terraform-plan.XXXXXX")"
          trap 'rm -f "${plan_file}"' EXIT
          terraform plan -input=false -no-color -out="${plan_file}"
          terraform apply -input=false -auto-approve "${plan_file}"
        env:
          PG_CONN_STR: ${{ secrets.PG_CONN_STR }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_PATH: /tmp/oci-api-key.pem
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_OCI_AVAILABILITY_DOMAIN: ${{ secrets.TF_VAR_OCI_AVAILABILITY_DOMAIN }}
          TF_VAR_OCI_COMPARTMENT_OCID: ${{ secrets.TF_VAR_OCI_COMPARTMENT_OCID }}
          TF_VAR_OCI_SSH_AUTHORIZED_KEYS: ${{ secrets.TF_VAR_OCI_SSH_AUTHORIZED_KEYS }}
          TF_VAR_SSH_INGRESS_CIDR: ${{ secrets.TF_VAR_SSH_INGRESS_CIDR }}

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/oci-api-key.pem
