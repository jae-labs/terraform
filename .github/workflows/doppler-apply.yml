name: "Terraform Doppler Apply"

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "doppler/**"
      - "modules/doppler/**"

jobs:
  apply:
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      module-path: doppler
      provider-token-name: DOPPLER_TOKEN
    secrets:
      GCP_SA_KEY: ${{ secrets.CONCIERGE_GCP_SA_KEY }}
      PROVIDER_TOKEN: ${{ secrets.CONCIERGE_DOPPLER_TOKEN }}
