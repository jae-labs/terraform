name: "Cloudflare Provider"

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "cloudflare/**"

jobs:
  apply:
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      module-path: cloudflare
      provider-token-name: CLOUDFLARE_API_TOKEN
    secrets: inherit
