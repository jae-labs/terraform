name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "github/**"
      - "cloudflare/**"
      - "doppler/**"
      - "oci/**"
      - "tailscale/**"
      - "sentry/**"
      - "grafana/**"
      - ".github/workflows/sentry-apply.yml"
      - ".github/workflows/grafana-provider.yml"
      - ".github/workflows/terraform-reusable.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "github/**"
      - "cloudflare/**"
      - "doppler/**"
      - "oci/**"
      - "tailscale/**"
      - "sentry/**"
      - "grafana/**"
      - ".github/workflows/sentry-apply.yml"
      - ".github/workflows/grafana-provider.yml"
      - ".github/workflows/terraform-reusable.yml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  # --- TERRAFORM JOBS ---
  tf-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # ratchet:hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.5"

      - name: Check Formatting
        run: terraform fmt -check -recursive .

  tf-tflint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # ratchet:terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Run TFLint
        run: tflint --recursive --config="$GITHUB_WORKSPACE/.tflint.hcl"

  tf-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - github
          - cloudflare
          - doppler
          - oci
          - tailscale
          - sentry
          - grafana
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # ratchet:hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init (Offline)
        run: terraform init -backend=false -lock-timeout=5m

      - name: Terraform Validate
        run: terraform validate
