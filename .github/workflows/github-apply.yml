name: "Terraform GitHub Apply"

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "github/**"

jobs:
  apply:
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      module-path: github
      provider-token-name: GITHUB_TOKEN
    secrets:
      PG_CONN_STR: ${{ secrets.PG_CONN_STR }}
      PROVIDER_TOKEN: ${{ secrets.GH_TOKEN }}
