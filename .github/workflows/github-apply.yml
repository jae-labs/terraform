name: "Terraform GitHub Apply"

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "iac/terraform/github/**"
      - "iac/terraform/modules/github/**"

jobs:
  apply:
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      module-path: iac/terraform/github
      provider-token-name: GITHUB_TOKEN
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      PROVIDER_TOKEN: ${{ secrets.GH_PAT }}
