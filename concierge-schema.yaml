            required: true

  - id: grafana_synthetic_check
    category: grafana
    kind: map_entry
    label: Grafana Synthetic Checks
    file: grafana/locals.tf
    root_path: synthetic_checks
    key_label: Check Key
    key_pattern: "^[a-z0-9-]+$"
    actions: [add, settings, delete]
    steps:
      - id: basics
        title: Check Configuration
        fields:
          - path: target
            type: string
            label: Target Endpoint
            required: true
          - path: job
            type: string
            label: Job Name
            required: true
          - path: type
            type: select
            label: Check Type
            required: true
            options: [http, ping, dns, tcp]
          - path: frequency
            type: integer
            label: Frequency (ms)
            required: true
          - path: timeout
            type: integer
            label: Timeout (ms)
          - path: enabled
            type: boolean
            label: Enabled
          - path: probes
            type: list_integer
            label: Probes
          - path: basic_metrics_only
            type: boolean
            label: Basic Metrics Only
          - path: settings.http.fail_if_not_ssl
            type: boolean
