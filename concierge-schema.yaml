          - path: zone
            type: select
            label: Zone
            required: true
            key_source:
              file: cloudflare/locals.tf
              root_path: zones
          - path: service
            type: select
            label: Worker Service
            required: true
            key_source:
              file: cloudflare/locals.tf
              root_path: worker_scripts

  - id: cloudflare_tunnel
    category: cloudflare
    kind: map_entry
    label: Cloudflare Tunnels
    file: cloudflare/locals.tf
    root_path: tunnels
    key_label: Tunnel Key
    actions: [add, settings, delete]
